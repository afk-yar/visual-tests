<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Аттрактор Лоренца — Opus 4.8</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="stage"></canvas>

  <div class="hud">
    <div class="title">Аттрактор Лоренца</div>
    <div class="eq">dx/dt = σ(y − x)<br>dy/dt = x(ρ − z) − y<br>dz/dt = xy − βz</div>
    <div class="params">σ = 10 &nbsp; ρ = 28 &nbsp; β = 8/3 &nbsp;·&nbsp; RK4</div>
  </div>

  <div class="panel">
    <button id="playPause" type="button">Пауза</button>
    <button id="reset" type="button">Сброс</button>
    <button id="spin" class="on" type="button">Вращение</button>
    <label>Скорость <input id="speed" type="range" min="0.25" max="3" step="0.05" value="1"></label>
    <label>След <input id="trail" type="range" min="500" max="6000" step="100" value="3000"></label>
  </div>

  <script src="lorenz.js"></script>
  <script src="app.js"></script>
</body>
</html>
