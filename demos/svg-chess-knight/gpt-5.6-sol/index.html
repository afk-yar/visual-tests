<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SVG шахматный конь — GPT-5.6 Sol</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden}
    body{background:#070a10;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
    svg{display:block;width:100%;height:100%}
  </style>
</head>
<body>
  <svg viewBox="0 0 800 800" preserveAspectRatio="xMidYMid meet"
       role="img" aria-labelledby="knight-title knight-desc"
       xmlns="http://www.w3.org/2000/svg">
    <title id="knight-title">Шахматный конь</title>
    <desc id="knight-desc">Светлая фигура шахматного коня на глубоком тёмном фоне</desc>

    <defs>
      <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#111827"/>
        <stop offset=".5" stop-color="#090d15"/>
        <stop offset="1" stop-color="#030509"/>
      </linearGradient>
      <radialGradient id="halo" cx="50%" cy="46%" r="48%">
        <stop offset="0" stop-color="#58708f" stop-opacity=".18"/>
        <stop offset=".58" stop-color="#243247" stop-opacity=".07"/>
        <stop offset="1" stop-color="#0b1019" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="ivory" x1="24%" y1="10%" x2="78%" y2="92%">
        <stop offset="0" stop-color="#fffef7"/>
        <stop offset=".28" stop-color="#eee9dd"/>
        <stop offset=".62" stop-color="#c8c2b7"/>
        <stop offset="1" stop-color="#8f8c88"/>
      </linearGradient>
      <linearGradient id="edgeLight" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#ffffff" stop-opacity=".9"/>
        <stop offset=".5" stop-color="#dcd7cb" stop-opacity=".2"/>
        <stop offset="1" stop-color="#7e8188" stop-opacity=".1"/>
      </linearGradient>
      <linearGradient id="mane" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#7d7d80"/>
        <stop offset=".55" stop-color="#4e5056"/>
        <stop offset="1" stop-color="#292d35"/>
      </linearGradient>
      <linearGradient id="baseFace" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#d9d4c9"/>
        <stop offset="1" stop-color="#77777a"/>
      </linearGradient>
      <radialGradient id="eyeGlow">
        <stop offset="0" stop-color="#ffe39a"/>
        <stop offset=".55" stop-color="#d9aa48"/>
        <stop offset="1" stop-color="#6b4319"/>
      </radialGradient>
      <filter id="figureShadow" x="-30%" y="-20%" width="170%" height="170%">
        <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#00030a" flood-opacity=".78"/>
        <feDropShadow dx="-8" dy="5" stdDeviation="7" flood-color="#7ea1c9" flood-opacity=".11"/>
      </filter>
      <filter id="softBlur" x="-30%" y="-100%" width="160%" height="300%">
        <feGaussianBlur stdDeviation="10"/>
      </filter>
    </defs>

    <rect width="800" height="800" fill="url(#background)"/>
    <circle cx="400" cy="373" r="342" fill="url(#halo)"/>
    <path d="M137 689 C245 657 558 657 666 689 C562 721 240 722 137 689Z"
          fill="#05070b" opacity=".8" filter="url(#softBlur)"/>

    <g filter="url(#figureShadow)">
      <!-- Тёмная грива выступает из-за светлого силуэта отдельными строгими прядями. -->
      <path d="M389 211 C356 234 335 265 329 300 L298 286 L315 325
               L283 325 L313 355 L279 370 L319 391 L287 416 L333 427
               L305 463 L350 458 L329 505 C360 478 385 447 397 411
               C409 374 403 330 397 291 C393 264 396 236 405 214Z"
            fill="url(#mane)" stroke="#a4a2a0" stroke-opacity=".18" stroke-width="2"/>

      <!-- Основной непрерывный силуэт головы и шеи. -->
      <path d="M278 617 C284 566 304 513 340 464
               C365 430 377 402 368 368 C356 324 350 284 373 244
               C392 211 423 185 461 166 L474 117
               C479 98 490 86 507 80 C513 108 512 137 506 163
               C548 179 587 207 613 243 C634 272 646 305 636 332
               C627 357 604 377 578 383 C540 392 508 371 472 348
               C453 336 438 339 426 356 C405 387 406 424 425 464
               C445 506 480 551 501 617Z"
            fill="url(#ivory)" stroke="#f5f1e7" stroke-opacity=".68" stroke-width="3"
            stroke-linejoin="round"/>

      <!-- Холодный полутон формирует нижнюю челюсть и добавляет объём. -->
      <path d="M472 348 C507 371 540 392 578 383 C604 377 627 357 636 332
               C618 344 600 347 579 344 C545 339 520 323 494 305
               C480 295 463 302 458 317 C454 328 460 339 472 348Z"
            fill="#717780" opacity=".34"/>

      <!-- Световой кант подчёркивает лоб и переносицу. -->
      <path d="M493 167 C544 185 584 215 608 252 C622 274 631 299 627 318"
            fill="none" stroke="url(#edgeLight)" stroke-width="8" stroke-linecap="round"
            opacity=".68"/>

      <!-- Пластика шеи: две спокойные кривые вместо лишней фактуры. -->
      <path d="M378 279 C396 320 402 352 393 390 C385 425 361 454 337 488"
            fill="none" stroke="#ffffff" stroke-opacity=".29" stroke-width="5"
            stroke-linecap="round"/>
      <path d="M425 464 C452 515 467 565 469 615"
            fill="none" stroke="#666a72" stroke-opacity=".38" stroke-width="9"
            stroke-linecap="round"/>

      <!-- Ухо с внутренней гранью. -->
      <path d="M480 119 C485 103 492 94 501 89 C503 110 502 131 498 151Z"
            fill="#686b70" opacity=".68"/>
      <path d="M477 118 C480 99 491 86 507 80"
            fill="none" stroke="#fffdf4" stroke-opacity=".72" stroke-width="3"
            stroke-linecap="round"/>

      <!-- Глаз и сдержанные черты морды. -->
      <path d="M511 244 C526 233 544 235 556 246 C542 254 525 255 511 244Z"
            fill="#343840" opacity=".88"/>
      <ellipse cx="535" cy="245" rx="8" ry="9" fill="url(#eyeGlow)"/>
      <circle cx="537" cy="246" r="3.2" fill="#111318"/>
      <circle cx="532.5" cy="241.5" r="1.8" fill="#fff7d2" opacity=".9"/>
      <path d="M567 299 C580 292 594 294 603 304"
            fill="none" stroke="#62666e" stroke-width="5" stroke-linecap="round" opacity=".78"/>
      <path d="M606 320 C614 319 620 322 623 327"
            fill="none" stroke="#30343b" stroke-width="5" stroke-linecap="round" opacity=".78"/>
      <path d="M515 274 C536 282 552 296 563 315"
            fill="none" stroke="#757982" stroke-opacity=".42" stroke-width="3"
            stroke-linecap="round"/>

      <!-- Пьедестал. -->
      <path d="M260 605 C254 605 248 611 247 619 L242 647
               C241 655 247 661 256 661 L526 661 C535 661 541 655 540 647
               L535 619 C534 611 528 605 521 605Z"
            fill="url(#baseFace)" stroke="#f2eee4" stroke-opacity=".54" stroke-width="3"/>
      <path d="M238 654 L545 654 C553 654 559 661 559 669 L559 680
               C559 689 552 696 543 696 L240 696 C231 696 224 689 224 680
               L224 669 C224 661 230 654 238 654Z"
            fill="url(#ivory)" stroke="#f8f4ea" stroke-opacity=".58" stroke-width="3"/>
      <path d="M245 667 H538" fill="none" stroke="#ffffff" stroke-opacity=".28"
            stroke-width="4" stroke-linecap="round"/>
      <path d="M240 690 H543" fill="none" stroke="#52565e" stroke-opacity=".45"
            stroke-width="5" stroke-linecap="round"/>
    </g>
  </svg>
</body>
</html>
