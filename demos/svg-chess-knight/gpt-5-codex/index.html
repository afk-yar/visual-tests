<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SVG Chess Knight</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --ink: #f4f0e8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 46%, rgba(99, 120, 158, 0.16), transparent 36rem),
        radial-gradient(circle at 22% 78%, rgba(205, 166, 95, 0.08), transparent 22rem),
        var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(16px, 3.5vmin, 44px);
    }

    svg {
      width: min(92vw, 92vh);
      height: min(92vw, 92vh);
      display: block;
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Stylized chess knight in inline SVG">
    <svg viewBox="0 0 800 800" role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg">
      <title id="title">Chess knight</title>
      <desc id="desc">A clean vector chess knight silhouette on a dark background.</desc>
      <defs>
        <linearGradient id="bodyGradient" x1="226" y1="106" x2="579" y2="684" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#fff9ec"/>
          <stop offset="0.38" stop-color="#e9e0cf"/>
          <stop offset="0.72" stop-color="#bdb29d"/>
          <stop offset="1" stop-color="#847963"/>
        </linearGradient>

        <linearGradient id="edgeGradient" x1="309" y1="83" x2="577" y2="646" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
          <stop offset="0.55" stop-color="#fff2d1" stop-opacity="0.35"/>
          <stop offset="1" stop-color="#4d4638" stop-opacity="0.38"/>
        </linearGradient>

        <linearGradient id="baseGradient" x1="222" y1="618" x2="584" y2="746" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#f5ead7"/>
          <stop offset="0.44" stop-color="#cfc2aa"/>
          <stop offset="1" stop-color="#756b58"/>
        </linearGradient>

        <filter id="softShadow" x="-18%" y="-18%" width="136%" height="142%" color-interpolation-filters="sRGB">
          <feDropShadow dx="0" dy="25" stdDeviation="22" flood-color="#000000" flood-opacity="0.55"/>
          <feDropShadow dx="0" dy="3" stdDeviation="2.2" flood-color="#ffffff" flood-opacity="0.14"/>
        </filter>

        <filter id="innerGlow" x="-8%" y="-8%" width="116%" height="116%" color-interpolation-filters="sRGB">
          <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
          <feOffset dx="-5" dy="-7" result="offset"/>
          <feComposite in="offset" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="rim"/>
          <feColorMatrix in="rim" type="matrix" values="
            1 0 0 0 1
            0 1 0 0 0.91
            0 0 1 0 0.72
            0 0 0 0.38 0"/>
          <feBlend in="SourceGraphic" mode="screen"/>
        </filter>

        <clipPath id="bodyClip">
          <path d="M270 645
            C270 595 287 546 320 501
            C348 463 357 430 342 395
            C325 357 329 319 356 285
            C386 247 432 221 472 184
            C501 157 531 112 558 94

      <ellipse cx="402" cy="708" rx="215" ry="34" fill="#020307" opacity="0.46"/>

      <g filter="url(#softShadow)">
        <path fill="url(#bodyGradient)" stroke="url(#edgeGradient)" stroke-width="7" stroke-linejoin="round" filter="url(#innerGlow)"

        <g clip-path="url(#bodyClip)">

      </g>
    </svg>
  </main>
</body>
</html>
