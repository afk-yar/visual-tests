<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Солнечная система — Opus 4.8</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <canvas id="stage"></canvas>

    <div class="vignette"></div>

    <div class="hud">
      <div class="hud-row">
        <span class="badge" id="fps">— FPS</span>
        <span class="badge alt" id="bodies">— тел</span>
      </div>
    </div>

    <div class="panel" id="panel">
      <div class="panel-head">
        <span class="title">☉ Солнечная система</span>
        <button id="collapse" type="button" title="Свернуть/развернуть">▾</button>
      </div>

      <div class="panel-body" id="panelBody">
        <label class="ctl">
          <span class="lbl">Скорость времени <em id="vSpeed">1.0×</em></span>
          <input id="speed" type="range" min="0" max="4" step="0.02" value="1.0">
        </label>

        <label class="ctl">
          <span class="lbl">Масштаб орбит <em id="vScale">1.00×</em></span>
          <input id="scale" type="range" min="0.45" max="1.8" step="0.01" value="1.0">
        </label>

        <label class="ctl">
          <span class="lbl">Наклон вида <em id="vTilt">62°</em></span>
          <input id="tilt" type="range" min="8" max="86" step="1" value="62">
        </label>

        <label class="ctl">
          <span class="lbl">Вращение камеры <em id="vSpin">0.30×</em></span>
          <input id="spin" type="range" min="0" max="1.5" step="0.02" value="0.30">
        </label>

        <label class="ctl">
          <span class="lbl">Длина следов <em id="vTrail">0.85</em></span>
          <input id="trail" type="range" min="0" max="1" step="0.01" value="0.85">
        </label>

        <div class="row">
          <label class="check"><input id="labels" type="checkbox" checked> подписи планет</label>
        </div>
        <div class="row">
          <label class="check"><input id="bloom" type="checkbox" checked> свечение и блум</label>
        </div>
        <div class="hint">Перетаскивай мышью — поворот камеры. Колесо — зум.</div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
