<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Аквариум — Opus 4.8</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="stage"></canvas>

  <div class="hud">
    <div class="title">Аквариум</div>
    <div class="sub">Подводный мир · процедурные рыбы, каустики, лучи света. Клик по воде — покормить.</div>
  </div>

  <div class="panel">
    <button id="playPause" type="button">Пауза</button>
    <button id="rays" class="on" type="button">Лучи</button>
    <button id="bubbles" class="on" type="button">Пузырьки</button>
    <button id="feed" type="button">Покормить</button>
    <label>Течение <input id="current" type="range" min="0" max="2" step="0.01" value="1"></label>
    <label>Темп <input id="tempo" type="range" min="0.3" max="2" step="0.01" value="1"></label>
  </div>

  <script src="main.js"></script>
</body>
</html>
