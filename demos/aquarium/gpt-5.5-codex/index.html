<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Аквариум — GPT-5.5 Codex</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="aquarium" aria-label="Процедурный аквариум с рыбами"></canvas>
  <div class="panel" aria-label="Управление аквариумом">
    <button id="pause" type="button">Пауза</button>
    <label>
      Живость
      <input id="energy" type="range" min="0.55" max="1.35" step="0.01" value="1">
    </label>
    <label>
      Муть
      <input id="haze" type="range" min="0.25" max="1.4" step="0.01" value="0.82">
    </label>
  </div>
  <script src="main.js"></script>
</body>
</html>
