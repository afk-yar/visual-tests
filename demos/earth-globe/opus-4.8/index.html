<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вращающийся земной шар — Opus 4.8</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="stage"></canvas>

  <div class="hud">
    <div class="title">Земля</div>
    <div class="sub">процедурная суша · мягкий терминатор · атмосфера · огни городов</div>
  </div>

  <div class="panel">
    <button id="spin" class="on" type="button">Вращение</button>
    <label>Скорость <input id="speed" type="range" min="0" max="3" step="0.05" value="1"></label>
    <label>Облака <input id="clouds" type="range" min="0" max="1" step="0.02" value="0.85"></label>
    <label class="check"><input id="auto" type="checkbox" checked> Свет по орбите</label>
    <button id="reset" type="button">Сброс</button>
  </div>

  <div class="hint">Перетаскивай по диску — двигаешь Солнце · колесо — приближение</div>

  <script src="main.js"></script>
</body>
</html>
