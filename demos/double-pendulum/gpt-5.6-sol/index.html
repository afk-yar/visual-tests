<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080b14">
  <title>Двойной маятник — GPT-5.6 Sol</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="scene" aria-label="Интерактивная симуляция двойного маятника"></canvas>
  <header class="hud">
    <div class="eyebrow"><span class="pulse"></span> Нелинейная динамика</div>
    <h1>Двойной маятник</h1>
    <p>Две почти одинаковые системы. Один крошечный сдвиг — и траектории расходятся.</p>
    <div class="metrics" aria-live="polite">
      <div><span>Время</span><strong id="timeValue">0,0 с</strong></div>
      <div><span>Расхождение</span><strong id="divergenceValue">0,000</strong></div>
      <div><span>Дрейф энергии</span><strong id="energyValue">0,000%</strong></div>
    </div>
  </header>
  <aside class="legend" aria-label="Легенда">
    <span><i class="dot main-dot"></i> основной</span>
    <span id="ghostLegend"><i class="dot ghost-dot"></i> призрак · +0,05°</span>
  </aside>
  <section class="panel" aria-label="Управление симуляцией">
    <div class="actions">
      <button id="toggleButton" class="primary" type="button"><span id="toggleIcon">Ⅱ</span><span id="toggleLabel">Пауза</span></button>
      <button id="resetButton" type="button"><span class="reset-icon">↺</span> Сброс</button>
      <label class="switch-wrap">
        <input id="ghostToggle" type="checkbox" checked><span class="switch" aria-hidden="true"></span>
        <span><b>Призрак</b><small>чувствительность к начальным условиям</small></span>
      </label>
    </div>
    <div class="sliders">
      <label><span><b>Масса 1</b><output id="m1Out"></output></span><input id="m1" type="range" min="0.25" max="3" step="0.05" value="1"></label>
      <label><span><b>Масса 2</b><output id="m2Out"></output></span><input id="m2" type="range" min="0.25" max="3" step="0.05" value="1.2"></label>
      <label><span><b>Длина 1</b><output id="l1Out"></output></span><input id="l1" type="range" min="0.45" max="1.65" step="0.05" value="1"></label>
      <label><span><b>Длина 2</b><output id="l2Out"></output></span><input id="l2" type="range" min="0.45" max="1.65" step="0.05" value="1"></label>
    </div>
    <div class="method"><span>RK4</span><span>240 Гц</span><span>полные уравнения Лагранжа</span></div>
  </section>
  <div class="shortcuts">Пробел — пуск/пауза&nbsp;&nbsp; R — сброс&nbsp;&nbsp; G — призрак</div>
  <script src="main.js"></script>
</body>
</html>
