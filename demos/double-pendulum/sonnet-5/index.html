<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Двойной маятник — Claude Sonnet 5</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="stage"></canvas>

<div class="hud">
  <h1>Двойной маятник</h1>
  <p>Лагранжева динамика · RK4 · режим «призрак» показывает хаос</p>
  <div class="energy" id="energy-readout">E: — · ΔE: —</div>
</div>

<section class="panel" aria-label="Управление симуляцией">
  <div class="panel-row panel-row--transport">
    <button id="btn-play" class="btn btn--primary" type="button">Пауза</button>
    <button id="btn-reset" class="btn" type="button">Сброс</button>
    <label class="switch" for="chk-ghost">
      <input id="chk-ghost" type="checkbox">
      <span class="switch-track" aria-hidden="true"></span>
      <span class="switch-label">Призрак</span>
    </label>
  </div>

  <div class="panel-row panel-row--sliders">
    <label class="slider">
      <span class="slider-name">m₁ <span id="val-m1" class="slider-val">1.00</span> кг</span>
      <input id="rng-m1" type="range" min="0.2" max="3" step="0.01" value="1">
    </label>
    <label class="slider">
      <span class="slider-name">m₂ <span id="val-m2" class="slider-val">1.00</span> кг</span>
      <input id="rng-m2" type="range" min="0.2" max="3" step="0.01" value="1">
    </label>
    <label class="slider">
      <span class="slider-name">l₁ <span id="val-l1" class="slider-val">1.00</span> м</span>
      <input id="rng-l1" type="range" min="0.3" max="1.5" step="0.01" value="1">
    </label>
    <label class="slider">
      <span class="slider-name">l₂ <span id="val-l2" class="slider-val">1.00</span> м</span>
      <input id="rng-l2" type="range" min="0.3" max="1.5" step="0.01" value="1">
    </label>
  </div>
</section>

<script src="pendulum.js"></script>
<script src="main.js"></script>
</body>
</html>
