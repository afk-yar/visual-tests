<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>«Рейкастер-лабиринт» — «Claude Sonnet 5»</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="scene" tabindex="0"></canvas>

<div class="hud">
  <h1 class="hud-title">Рейкастер-лабиринт</h1>
  <p class="hud-sub">Псевдо-3D, DDA-рейкастинг по сетке · Claude Sonnet 5</p>
</div>

<div class="panel">
  <div class="controls">
    <span class="key-group"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> — движение / стрейф</span>
    <span class="key-group"><kbd>←</kbd><kbd>→</kbd> — поворот</span>
  </div>
  <button id="regen-btn" class="btn" type="button">Новый лабиринт</button>
</div>

<script src="maze.js"></script>
<script src="main.js"></script>
</body>
</html>
