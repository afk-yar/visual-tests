<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ткань (верлет) — GPT-5.6 Sol</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="cloth" aria-label="Интерактивная симуляция ткани"></canvas>

  <header class="hud">
    <div class="brand">
      <span class="eyebrow">VERLET LAB / 01</span>
      <h1>Живая ткань</h1>
      <p>Схватите сетку и потяните. Сильное натяжение разрывает нити.</p>
    </div>

    <div class="controls">
      <div class="status" aria-live="polite">
        <span class="pulse"></span>
        <span id="statusText">Сетка стабильна</span>
      </div>
      <button id="resetButton" type="button" title="Сбросить симуляцию (R)">
        <span class="reset-icon" aria-hidden="true">↻</span>
        Сбросить
      </button>
    </div>
  </header>

  <div class="hint" aria-hidden="true">
    <span class="mouse-icon"></span>
    <span>Тяните ткань</span>
  </div>

  <script src="main.js"></script>
</body>
</html>
