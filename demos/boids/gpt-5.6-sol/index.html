<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Стая boids — GPT-5.6 Sol</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="world" aria-label="Интерактивная симуляция стаи из 520 птиц"></canvas>

  <main class="hud">
    <header class="intro">
      <p class="eyebrow">AGENT STUDY / 01</p>
      <h1>Стая <span>boids</span></h1>
      <p class="lede">Локальные решения.<br>Коллективное движение.</p>
    </header>

    <section class="telemetry" aria-label="Телеметрия симуляции">
      <div><span id="fps">60</span><small>FPS</small></div>
      <div><span id="neighborCount">0</span><small>В ПОЛЕ</small></div>
      <div><span>520</span><small>АГЕНТОВ</small></div>
    </section>

    <aside class="control-panel" aria-label="Параметры стаи">
      <div class="panel-heading">
        <div>
          <p class="panel-kicker">ПАРАМЕТРЫ</p>
          <h2>Поведение стаи</h2>
        </div>
        <button id="pauseButton" class="pause-button" type="button" aria-pressed="false">Пауза</button>
      </div>

      <div class="control-list">
        <label class="control" for="separation">
          <span><i class="rule-dot separation-dot"></i>Разделение</span>
          <output id="separationValue" for="separation">1,55</output>
          <input id="separation" type="range" min="0" max="2.5" step="0.05" value="1.55">
        </label>
        <label class="control" for="alignment">
          <span><i class="rule-dot alignment-dot"></i>Выравнивание</span>
          <output id="alignmentValue" for="alignment">1,00</output>
          <input id="alignment" type="range" min="0" max="2.5" step="0.05" value="1">
        </label>
        <label class="control" for="cohesion">
          <span><i class="rule-dot cohesion-dot"></i>Сцепление</span>
          <output id="cohesionValue" for="cohesion">0,80</output>
          <input id="cohesion" type="range" min="0" max="2.5" step="0.05" value="0.8">
        </label>
        <label class="control" for="perception">
          <span>Радиус восприятия</span>
          <output id="perceptionValue" for="perception">88 px</output>
          <input id="perception" type="range" min="35" max="160" step="1" value="88">
        </label>
        <label class="control" for="maxSpeed">
          <span>Максимальная скорость</span>
          <output id="maxSpeedValue" for="maxSpeed">96 px/с</output>
          <input id="maxSpeed" type="range" min="40" max="180" step="1" value="96">
        </label>
      </div>

      <p class="hint"><span></span>Выбранный агент · кликните по стае, чтобы сменить</p>
    </aside>
  </main>

  <p class="sr-only">Используйте ползунки, чтобы менять силу трёх правил, радиус восприятия и скорость. Нажмите пробел для паузы.</p>
  <script src="main.js"></script>
</body>
</html>
