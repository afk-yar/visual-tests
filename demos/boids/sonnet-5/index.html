<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>«Стая boids» — «Claude Sonnet 5»</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<canvas id="stage"></canvas>

<div class="hud">
  <h1 class="hud-title">Стая boids</h1>
  <p class="hud-sub">Разделение · выравнивание · сцепление на тороидальном поле — 500 агентов</p>
  <div class="legend">
    <span class="legend-item"><i class="dot dot-watched"></i>наблюдаемый агент</span>
    <span class="legend-item"><i class="dot dot-neighbor"></i>его соседи</span>
    <span class="legend-item"><i class="ring"></i>радиус восприятия</span>
  </div>
</div>

<div class="panel">
  <div class="control">
    <label for="sep">Разделение <output id="sepVal">1.5</output></label>
    <input id="sep" type="range" min="0" max="3" step="0.1" value="1.5" />
  </div>
  <div class="control">
    <label for="ali">Выравнивание <output id="aliVal">1.0</output></label>
    <input id="ali" type="range" min="0" max="3" step="0.1" value="1.0" />
  </div>
  <div class="control">
    <label for="coh">Сцепление <output id="cohVal">1.0</output></label>
    <input id="coh" type="range" min="0" max="3" step="0.1" value="1.0" />
  </div>
  <div class="control">
    <label for="radius">Радиус восприятия <output id="radiusVal">80</output></label>
    <input id="radius" type="range" min="20" max="250" step="5" value="80" />
  </div>
  <div class="control">
    <label for="speed">Макс. скорость <output id="speedVal">160</output></label>
    <input id="speed" type="range" min="50" max="400" step="10" value="160" />
  </div>
  <button id="reshuffle" type="button">Пересыпать стаю</button>
  <span class="hint">клик по полю — выбрать наблюдаемого агента</span>
</div>

<script src="boids.js"></script>
<script src="main.js"></script>
</body>
</html>
