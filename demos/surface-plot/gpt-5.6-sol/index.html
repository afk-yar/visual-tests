<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#070b16">
  <title>3D-поверхность функции — GPT-5.6 Sol</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="surface" aria-label="Анимированный трёхмерный график функции"></canvas>

  <header class="hud">
    <div class="eyebrow"><span class="live-dot" aria-hidden="true"></span> ЖИВАЯ МОДЕЛЬ · 2D CANVAS</div>
    <h1>Поле высот</h1>
    <p id="formula">z = sin(2.1r − 2t) · e<sup>−0.08r²</sup> / (0.7 + r)</p>
  </header>

  <aside class="readout" aria-hidden="true">
    <span class="readout-label">ПРОЕКЦИЯ</span>
    <strong>ПЕРСПЕКТИВНАЯ</strong>
    <i></i>
    <span class="readout-label">СЕТКА</span>
    <strong id="gridReadout">38 × 38</strong>
  </aside>

  <section class="control-panel" aria-label="Управление графиком">
    <div class="control-group function-group">
      <span class="control-label">ФУНКЦИЯ</span>
      <div class="segmented" role="group" aria-label="Выбор функции">
        <button class="function-button is-active" type="button" data-function="ripple" aria-pressed="true">Рябь</button>
        <button class="function-button" type="button" data-function="saddle" aria-pressed="false">Седло</button>
        <button class="function-button" type="button" data-function="gaussian" aria-pressed="false">Гауссиана</button>
      </div>
    </div>

    <div class="panel-rule" aria-hidden="true"></div>

    <label class="control-group speed-control">
      <span class="control-label">СКОРОСТЬ</span>
      <span class="range-line">
        <input id="speed" type="range" min="0" max="1.5" step="0.05" value="0.7" aria-label="Скорость вращения">
        <output id="speedValue" for="speed">0.70×</output>
      </span>
    </label>

    <div class="panel-rule" aria-hidden="true"></div>

    <label class="toggle-row">
      <span class="toggle-copy"><b>Каркас</b><small>поверх заливки</small></span>
      <input id="wireframe" type="checkbox" checked>
      <span class="switch" aria-hidden="true"></span>
    </label>
  </section>

  <div class="hint" aria-hidden="true"><span></span> Камера вращается автоматически</div>

  <script src="main.js"></script>
</body>
</html>
