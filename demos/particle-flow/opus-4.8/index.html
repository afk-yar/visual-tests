<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Поток частиц 3D — Opus 4.8</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="stage"></canvas>

  <div class="hud">
    <div class="title">Поток частиц 3D</div>
    <div class="sub">curl-noise · аддитивное свечение · затухающие следы</div>
    <div class="stat" id="stat">—</div>
  </div>

  <div class="panel">
    <button id="playPause" type="button">Пауза</button>
    <button id="spin" class="on" type="button">Вращение</button>
    <button id="palette" type="button">Палитра</button>
    <label>Частиц <input id="count" type="range" min="8000" max="90000" step="2000" value="48000"></label>
    <label>Поток <input id="flow" type="range" min="0.3" max="2.2" step="0.05" value="1"></label>
    <label>След <input id="trail" type="range" min="0.02" max="0.30" step="0.01" value="0.09"></label>
    <label>Свечение <input id="glow" type="range" min="0.4" max="2.0" step="0.05" value="1.1"></label>
  </div>

  <script src="noise.js"></script>
  <script src="main.js"></script>
</body>
</html>
